<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - MeetingAI Pro</title>
    <meta name="theme-color" content="#0ea5e9">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 48px;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 16px;
        }
        
        p {
            font-size: 18px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            space-x: 2;
            background: #f1f5f9;
            padding: 12px 24px;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-text {
            font-weight: 600;
            color: #64748b;
            font-size: 14px;
        }
        
        button {
            background: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(14, 165, 233, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .retry-btn {
            background: white;
            color: #0ea5e9;
            border: 2px solid #0ea5e9;
            margin-top: 12px;
        }
        
        .retry-btn:hover {
            background: #f0f9ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        
        <div class="status">
            <span class="dot"></span>
            <span class="status-text">You're offline</span>
        </div>
        
        <h1>No Internet Connection</h1>
        
        <p>
            Don't worry! MeetingAI Pro will work as soon as you're back online. 
            Your meetings and data are safe.
        </p>
        
        <button onclick="window.location.reload()">
            Try Again
        </button>
        
        <button class="retry-btn" onclick="checkConnection()">
            Check Connection
        </button>
    </div>

    <script>
        // Auto-retry when connection is restored
        window.addEventListener('online', () => {
            window.location.reload();
        });

        // Check connection status
        function checkConnection() {
            if (navigator.onLine) {
                window.location.reload();
            } else {
                alert('Still offline. Please check your internet connection.');
            }
        }

        // Update status in real-time
        function updateStatus() {
            const dot = document.querySelector('.dot');
            const text = document.querySelector('.status-text');
            
            if (navigator.onLine) {
                dot.style.background = '#22c55e';
                text.textContent = 'Reconnecting...';
            } else {
                dot.style.background = '#ef4444';
                text.textContent = "You're offline";
            }
        }

        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
    </script>
</body>
</html>
