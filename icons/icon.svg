<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded Square Background -->
  <rect width="512" height="512" rx="120" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- CPU/Brain Icon -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Central chip -->
    <rect x="-80" y="-80" width="160" height="160" rx="24" fill="white" opacity="0.95"/>
    
    <!-- Circuit lines -->
    <line x1="-80" y1="-40" x2="-120" y2="-40" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="80" y1="-40" x2="120" y2="-40" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="-80" y1="0" x2="-120" y2="0" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="80" y1="0" x2="120" y2="0" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="-80" y1="40" x2="-120" y2="40" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="80" y1="40" x2="120" y2="40" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="-40" y1="-80" x2="-40" y2="-120" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="0" y1="-80" x2="0" y2="-120" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="40" y1="-80" x2="40" y2="-120" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="-40" y1="80" x2="-40" y2="120" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="0" y1="80" x2="0" y2="120" stroke="white" stroke-width="12" stroke-linecap="round"/>
    <line x1="40" y1="80" x2="40" y2="120" stroke="white" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Inner gradient circle -->
    <circle cx="0" cy="0" r="50" fill="url(#grad1)"/>
    
    <!-- AI sparkles -->
    <circle cx="-30" cy="-30" r="8" fill="white" opacity="0.8"/>
    <circle cx="35" cy="-25" r="6" fill="white" opacity="0.6"/>
    <circle cx="25" cy="35" r="7" fill="white" opacity="0.7"/>
    <circle cx="-25" cy="30" r="5" fill="white" opacity="0.5"/>
  </g>
  
  <!-- M Letter Overlay -->
  <text x="256" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">M</text>
</svg>
